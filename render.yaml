services:
  - type: web
    name: pakistan-style-ludo
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: TURN_TIMEOUT_MS
        value: "90000"
      - key: ROOM_TTL_MS
        value: "43200000"
    disk:
      name: ludo-data
      mountPath: /var/data
      sizeGB: 1
