services:
  - type: web
    name: laghmani-ludo
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --registry=https://registry.npmjs.org --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: DATA_DIR
        value: /tmp/ludo-data
